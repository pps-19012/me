---
layout: base
---

<nav class="navbar">
    <div class="nav-links">
        <a href="{{ site.baseurl }}/projects.html">← Back to Projects</a>
    </div>
    <button id="theme-toggle" aria-label="Toggle Dark Mode"></button>
</nav>

<main class="container">

    <header style="margin-bottom: 2rem;">
        <h1 style="margin-bottom: 0.5rem;">{{ page.title }}</h1>
        <!-- <p style="color: var(--accent-color); font-family: var(--font-mono); font-size: 0.9rem;">
            {{ page.stack }}
        </p> -->
        {% if page.github or page.webstore %}
        <div style="margin-top: 1rem; font-family: var(--font-mono); font-size: 0.9rem;">
            {% if page.github %}<a href="{{ page.github }}" target="_blank" rel="noopener noreferrer">Source Code ↗</a>{% endif %}
            {% if page.github and page.webstore %}<span style="margin: 0 10px; color: var(--accent-color);">·</span>{% endif %}
            {% if page.webstore %}<a href="{{ page.webstore }}" target="_blank" rel="noopener noreferrer">Chrome Web Store ↗</a>{% endif %}
        </div>
        {% endif %}
    </header>

    <hr>

    <article class="project-content">
        {{ content }}
    </article>

</main>
