<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Title - Alex Dev</title>
    
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="../projects.html">← Back to Projects</a>
        </div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"></button>
    </nav>

    <main class="container">
        
        <header style="margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0.5rem;">Project Name</h1>
            <p style="color: var(--accent-color); font-family: var(--font-sans);">
                Tech Stack 1 • Tech Stack 2 • Year
            </p>
            
            <div style="margin-top: 1rem; font-family: var(--font-sans); font-size: 0.9rem;">
                <a href="#" style="margin-right: 15px;">View Live Demo ↗</a>
                <a href="#">GitHub Repo ↗</a>
            </div>
        </header>

        <hr>

        <article class="project-content">
            
            <h3>The Goal</h3>
            <p>
                Describe what you built and why.
            </p>

            <figure style="margin: 2rem 0;">
                <img src="https://via.placeholder.com/700x400" alt="Screenshot" style="width: 100%; border-radius: 4px; border: 1px solid var(--border-color);">
                <figcaption style="text-align: center; font-size: 0.85rem; color: var(--accent-color); margin-top: 0.5rem;">Caption goes here</figcaption>
            </figure>

            <h3>How it works</h3>
            <p>
                Explain the technical details here.
            </p>

        </article>

    </main>

    <script src="../script.js"></script>
</body>
</html>
