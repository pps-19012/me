<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Title - Alex Dev</title>
    
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="../blog.html">← Back to Blog</a>
        </div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"></button>
    </nav>

    <main class="container">
        
        <article>
            <header style="margin-bottom: 2rem;">
                <span style="font-family: var(--font-sans); color: var(--accent-color); font-size: 0.9rem;">Date Goes Here</span>
                <h1 style="font-size: 2.2rem; margin-top: 0.5rem;">Blog Post Title</h1>
            </header>

            <hr>

            <div class="blog-body">
                <p class="lead">
                    Your first paragraph goes here...
                </p>

                <h3>Subheading</h3>
                <p>
                    More content here...
                </p>
                
                <blockquote>
                    This is a quote style.
                </blockquote>
            </div>
        </article>

    </main>

    <script src="../script.js"></script>
</body>
</html>
