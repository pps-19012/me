<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="/style.css"> <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container" style="text-align: center; padding-top: 5rem;">
        
        <h1 style="font-size: 4rem; margin-bottom: 0;">404</h1>
        <p style="font-family: var(--font-mono); color: var(--accent-color);">Page not found.</p>
        
        <hr style="margin: 2rem auto; max-width: 100px;">

        <p>The page you are looking for has been moved or deleted.</p>
        
        <a href="/" class="view-all">← Return to Home</a>

    </main>

    <script src="/script.js"></script>
</body>
</html>
