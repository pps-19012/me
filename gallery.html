    <script>
        (function() {
            const theme = localStorage.getItem('theme') ||

    <style>
        /* Internal CSS specific to Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 1 / 1; /* Force square images */
            border: 1px solid var(--border-color);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            filter: grayscale(100%); /* B/W Default */
        }
        .gallery-item:hover img {
            transform: scale(1.05); /* Slight zoom on hover */
            filter: grayscale(0%);  /* Reveal color on hover (optional) */
        }
        .caption {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
